<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fast, Cheap, Good - The Rule</title>
    <style>
        :root {
            --bg-color: #e8e4da;
            --panel-color: #5d1a1a;
            --text-color: #d4a373;
            --switch-bg: #4a1414;
            --knob-color: #cc8e35;
        }

        body {
            background-color: var(--bg-color);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: 'Arial Black', sans-serif;
        }

        /* The Main Panel */
        .panel {
            background-color: var(--panel-color);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3), inset 0 2px 5px rgba(255,255,255,0.1);
            display: flex;
            flex-direction: column;
            gap: 20px;
            width: 320px;
        }

        .row {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .label {
            color: var(--text-color);
            font-size: 2.5rem;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        /* Switch Styling */
        .switch {
            position: relative;
            display: inline-block;
            width: 70px;
            height: 34px;
        }

        .switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: var(--switch-bg);
            transition: .4s;
            border-radius: 34px;
            box-shadow: inset 0 2px 10px rgba(0,0,0,0.5);
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 26px;
            width: 26px;
            left: 4px;
            bottom: 4px;
            background-color: var(--knob-color);
            transition: .4s;
            border-radius: 50%;
            box-shadow: 0 2px 5px rgba(0,0,0,0.3);
        }

        input:checked + .slider:before {
            transform: translateX(36px);
        }

        /* Footer Info */
        .footer {
            position: absolute;
            bottom: 20px;
            font-family: sans-serif;
            color: #888;
            font-size: 0.8rem;
        }
    </style>
</head>
<body>

    <div class="panel">
        <div class="row">
            <span class="label">Fast</span>
            <label class="switch">
                <input type="checkbox" id="fast" class="toggle">
                <span class="slider"></span>
            </label>
        </div>
        <div class="row">
            <span class="label">Cheap</span>
            <label class="switch">
                <input type="checkbox" id="cheap" class="toggle">
                <span class="slider"></span>
            </label>
        </div>
        <div class="row">
            <span class="label">Good</span>
            <label class="switch">
                <input type="checkbox" id="good" class="toggle">
                <span class="slider"></span>
            </label>
        </div>
    </div>

    <div class="footer">Pick any two. You can't have all three.</div>

    <script>
        const toggles = document.querySelectorAll('.toggle');
        const fast = document.getElementById('fast');
        const cheap = document.getElementById('cheap');
        const good = document.getElementById('good');

        toggles.forEach(toggle => {
            toggle.addEventListener('change', (e) => {
                const checked = document.querySelectorAll('.toggle:checked');
                
                // Logic: If 3 are selected, deselect one based on which one was clicked
                if (checked.length === 3) {
                    if (fast === e.target) {
                        good.checked = false;
                    }
                    if (cheap === e.target) {
                        fast.checked = false;
                    }
                    if (good === e.target) {
                        cheap.checked = false;
                    }
                }
            });
        });
    </script>
</body>
</html>
